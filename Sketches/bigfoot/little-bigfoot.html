<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Little Bigfoot | Bigfoot | Ron English Catalogue Raisonn&eacute;</title>

  <link rel="stylesheet" href="../../css/styles.css" />

  <style>
    :root{
      --border:#e5e7eb;
      --muted:#4b5563;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:18px;
      --bg:#ffffff;
      --panel:#f3f4f6;
      --card:#ffffff;
      --pill-hover:#f9fafb;
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:#111;
      background:var(--bg);
      padding-left:0;
      padding-right:0;
    }

    .wrap{
      max-width:1240px;
      margin:0 auto;
      padding:28px 18px 60px;
    }

    .page-narrow{
      max-width:1100px;
    }

    .nav-pills{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:22px 0;
    }

    .nav-pill{
      padding:8px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      color:#111;
      text-decoration:none;
      font-size:14px;
      transition:background .12s ease, border-color .12s ease, transform .12s ease;
    }

    .nav-pill:hover{
      background:var(--pill-hover);
      border-color:#d1d5db;
      transform:translateY(-1px);
    }

    .page-header{
      max-width:1100px;
      margin:0 0 28px;
      padding:0;
      text-align:left;
    }

    .page-title{
      margin:0 0 10px;
      font-size:clamp(2rem,4vw,3rem);
      letter-spacing:-.02em;
      line-height:1.05;
    }

    .intro-text{
      max-width:1100px;
      margin:0 0 28px;
      padding:0;
      line-height:1.6;
      text-align:left;
    }

    .intro-text p{
      margin:0 0 14px;
      max-width:none;
      width:100%;
      color:var(--muted);
      font-size:18px;
    }

    .section-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:24px;
    }

    .section-card h2{
      margin:0 0 8px;
      font-size:1.4rem;
    }

    .section-card h3{
      margin:22px 0 14px;
      font-size:1.05rem;
    }

    .section-intro{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.6;
    }

    .index-grid{
      margin-top:28px;
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:18px;
    }

    .gallery-grid,
    .card-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .trading-card-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:20px;
    }

    .additional-card-grid{
      display:grid;
      grid-template-columns:minmax(220px,420px);
      gap:20px;
      margin:0 auto;
      justify-content:center;
      max-width:460px;
    }

    .originals-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
    }

    .gallery-item{
      display:block;
      text-decoration:none;
      color:inherit;
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 4px 18px rgba(0,0,0,.04);
      margin:0;
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .gallery-item:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 40px rgba(0,0,0,.12);
      border-color:#d1d5db;
    }

    .gallery-item a{
      display:block;
      color:inherit;
      text-decoration:none;
    }

    .gallery-item img{
      display:block;
      width:100%;
      object-fit:contain;
      background:var(--panel);
      padding:8px;
      border-bottom:0;
    }

    .index-grid .gallery-item img{
      height:260px;
      padding:10px;
      border-bottom:1px solid var(--border);
    }

    .gallery-grid .gallery-item img{
      height:300px;
    }

    .originals-grid .gallery-item img{
      height:440px;
    }

    .card-grid .gallery-item img,
    .trading-card-grid .gallery-item img,
    .additional-card-grid .gallery-item img{
      height:520px;
      padding:10px;
    }

    .entry-body{
      padding:16px 18px 18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .work-title{
      margin:0;
      padding:0;
      width:100%;
      font-size:18px;
      line-height:1.35;
      font-weight:600;
      text-align:center;
    }

    .card-text-block{
      margin-top:20px;
      padding:18px;
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel);
      display:grid;
      grid-template-columns:minmax(240px,0.95fr) minmax(280px,1.05fr);
      gap:24px;
      align-items:start;
    }

    .compact-card-text{
      grid-template-columns:1fr;
    }

    .card-column{
      min-width:0;
    }

    .text-label{
      display:block;
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      margin-bottom:8px;
    }

    .card-details{
      display:grid;
      gap:8px;
    }

    .card-detail{
      margin:0;
      line-height:1.55;
    }

    .poem{
      margin:0;
      white-space:pre-line;
      line-height:1.65;
    }

    .back-link{
      margin-top:28px;
    }

    .back-link a{
      display:inline-block;
      text-decoration:none;
      color:#111;
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 16px;
      background:#fff;
    }

    .back-link a:hover{
      background:#f9fafb;
    }

    footer{
      margin-top:34px;
      padding-top:16px;
      border-top:1px solid var(--border);
      color:var(--muted);
      font-size:14px;
    }

    @media (max-width:1100px){
      .index-grid{
        grid-template-columns:repeat(3,minmax(0,1fr));
      }
    }

    @media (max-width:820px){
      .index-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .card-text-block{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:560px){
      .wrap{
        padding:22px 14px 50px;
      }

      .index-grid,
      .gallery-grid,
      .card-grid,
      .trading-card-grid,
      .additional-card-grid,
      .originals-grid{
        grid-template-columns:1fr;
      }

      .index-grid .gallery-item img,
      .gallery-grid .gallery-item img{
        height:260px;
      }

      .originals-grid .gallery-item img{
        height:340px;
      }

      .card-grid .gallery-item img,
      .trading-card-grid .gallery-item img,
      .additional-card-grid .gallery-item img{
        height:420px;
      }
    }
  
    /* BEGIN SKETCHES CENTERING OVERRIDES */
    .nav-pills{
      justify-content:center;
      text-align:center;
    }

    .page-header{
      text-align:center;
      margin-left:auto;
      margin-right:auto;
    }

    .page-title,
    h1.page-title{
      text-align:center;
    }

    .intro-text{
      text-align:center;
      margin-left:auto;
      margin-right:auto;
    }

    .intro-text p{
      text-align:center;
      margin-left:auto;
      margin-right:auto;
    }

    .section-card h2,
    .section-card h3{
      text-align:center;
    }

    .section-intro{
      text-align:center;
      margin-left:auto;
      margin-right:auto;
    }

    .entry-body{
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .entry-body h3,
    .entry-body p,
    .work-title,
    .work-subtitle,
    .image-caption,
    .gallery-item .entry-body .work-title,
    .gallery-item .entry-body .work-subtitle,
    .gallery-item .entry-body .work-note{
      text-align:center;
      width:100%;
    }

    footer{
      text-align:center;
    }

    .back-link{
      text-align:left;
    }

    .back-link a{
      text-align:left;
    }
    /* END SKETCHES CENTERING OVERRIDES */
  </style>
</head>
<body>
  <main class="wrap page-narrow">
    <nav class="nav-pills" aria-label="Site navigation">
      <a class="nav-pill" href="https://ronenglish-archive.github.io/ron-english-catalogue-raisonne/">Catalogue home</a>
      <a class="nav-pill" href="../index.html">Sketches</a>
      <a class="nav-pill" href="index.html">Bigfoot</a>
    </nav>

    <header class="page-header">
      <h1 class="page-title">Little Bigfoot</h1>
    </header>

    <section class="section-card" aria-labelledby="original-drawing">
      <h2 id="original-drawing">Original Drawing</h2>

      <div class="originals-grid">
        <figure class="gallery-item">
          <a href="../../images/Sketches/bigfoot/Little%20Bigfoot%20ORIGINAL.jpg" target="_blank" rel="noopener noreferrer">
            <img src="../../images/Sketches/bigfoot/Little%20Bigfoot%20ORIGINAL.jpg" alt="Little Bigfoot original drawing by Ron English" loading="lazy" />
          </a>
        </figure>

      </div>
    </section>

    <section class="section-card" aria-labelledby="digitized-versions">
      <h2 id="digitized-versions">Digitized Versions</h2>
      <div class="gallery-grid">
        <figure class="gallery-item">
          <a href="../../images/Sketches/bigfoot/Little%20Bigfoot%20B&amp;W.jpg" target="_blank" rel="noopener noreferrer">
            <img src="../../images/Sketches/bigfoot/Little%20Bigfoot%20B&amp;W.jpg" alt="Little Bigfoot black-and-white digital version by Ron English" loading="lazy" />
          </a>
        </figure>

        <figure class="gallery-item">
          <a href="../../images/Sketches/bigfoot/Little%20Bigfoot%20COLOR.jpg" target="_blank" rel="noopener noreferrer">
            <img src="../../images/Sketches/bigfoot/Little%20Bigfoot%20COLOR.jpg" alt="Little Bigfoot color digital version by Ron English" loading="lazy" />
          </a>
        </figure>

      </div>
    </section>

    <div class="back-link">
      <a href="index.html">&larr; Back to Bigfoot</a>
    </div>
  </main>
</body>
</html>
